name: Build Android APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Validate API URL secret
        run: |
          if [ -z "${{ secrets.FIXWHEEL_API_URL }}" ]; then
            echo "::error::Add repository secret FIXWHEEL_API_URL (your Vercel URL, e.g. https://fix-wheel.vercel.app)"
            exit 1
          fi
          URL="${{ secrets.FIXWHEEL_API_URL }}"
          if echo "$URL" | grep -qi "REPLACE_WITH_YOUR"; then
            echo "::error::FIXWHEEL_API_URL secret still contains the placeholder text"
            exit 1
          fi
          if ! echo "$URL" | grep -q "^https://"; then
            echo "::error::FIXWHEEL_API_URL must start with https://"
            exit 1
          fi
          echo "API host: $(echo "$URL" | sed -E 's|https?://([^/]+).*|\1|')"

      - name: Build release APK
        working-directory: android
        env:
          FIXWHEEL_API_URL: ${{ secrets.FIXWHEEL_API_URL }}
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -PFIXWHEEL_API_URL="${FIXWHEEL_API_URL}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fixwheel-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
